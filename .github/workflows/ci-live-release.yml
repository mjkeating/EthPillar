name: CI — Live Release

# Informational until branch protection promotes these checks to required.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-live-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-release:
    uses: ./.github/workflows/live-release-test.yml
    secrets: inherit
