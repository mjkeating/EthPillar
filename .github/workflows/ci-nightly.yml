name: CI — Nightly

# Full test suite: unit, bats, live release, and integration (with caches).
# Informational until branch protection promotes these checks to required.
on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read
  # integration-test.yml uses gh cache delete/save (actions/cache/save); caller must grant write permission
  actions: write

concurrency:
  group: ci-nightly
  cancel-in-progress: false

jobs:
  unit-and-bats:
    uses: ./.github/workflows/unit-bats-tests.yml

  live-release:
    uses: ./.github/workflows/live-release-test.yml
    secrets: inherit

  integration:
    uses: ./.github/workflows/integration-test.yml
    secrets: inherit
    with:
      artifact_name_prefix: nightly-integration
