name: CI — Integration

# Informational until branch protection promotes these checks to required.
# Scheduled full-suite runs use ci-nightly.yml; use workflow_dispatch for ad-hoc integration only.
on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-integration
  cancel-in-progress: false

jobs:
  integration:
    uses: ./.github/workflows/integration-test.yml
    secrets: inherit
    with:
      artifact_name_prefix: integration-report
