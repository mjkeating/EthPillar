name: CI — Live Release

# Informational until branch protection promotes these checks to required.
on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-live-release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t ethpillar-test -f tests/integration/Dockerfile.test .

      - name: Live release tests
        run: |
          docker run --rm \
            -e GITHUB_TOKEN \
            -v "${{ github.workspace }}:/ethpillar" \
            ethpillar-test \
            bash /ethpillar/tests/run_live_release_tests.sh
