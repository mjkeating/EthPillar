name: CI — Unit & Bats

# Informational until branch protection promotes these checks to required.
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-unit-bats-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-bats:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build test image
        run: docker build -t ethpillar-test -f tests/integration/Dockerfile.test .

      - name: Unit tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/ethpillar" \
            ethpillar-test \
            bash /ethpillar/tests/run_unit_tests.sh tests/ -v

      - name: Bats tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/ethpillar" \
            ethpillar-test \
            bats tests/
