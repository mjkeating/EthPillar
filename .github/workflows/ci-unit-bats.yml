name: CI — Unit & Bats

# Informational until branch protection promotes these checks to required.
on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-unit-bats-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  unit-and-bats:
    uses: ./.github/workflows/unit-bats-tests.yml
