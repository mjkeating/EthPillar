# Local-only smoke test for act: exercises cache restore/save without the full matrix.
# Not triggered on GitHub (workflow_dispatch only). Run via scripts/run-act-integration.ps1.
name: Act — Integration cache smoke

on:
  workflow_dispatch:

permissions:
  contents: read
  actions: write

jobs:
  cache-smoke:
    runs-on: ubuntu-latest
    env:
      ETHPILLAR_CHECKPOINT_CACHE_DIR: ${{ github.workspace }}/tests/integration/checkpoint_cache
    steps:
      - uses: actions/checkout@v6

      - name: Prepare cache directories
        run: |
          mkdir -p tests/integration/cache tests/integration/checkpoint_cache

      - name: Restore binary download cache
        uses: actions/cache/restore@v5
        with:
          path: tests/integration/cache
          key: binary-cache-${{ runner.os }}-v1
          restore-keys: |
            binary-cache-${{ runner.os }}-

      - name: Restore checkpoint cache
        uses: actions/cache@v5
        with:
          path: tests/integration/checkpoint_cache
          key: checkpoint-${{ runner.os }}-${{ hashFiles('tests/integration/checkpoint_cache/manifest.json') }}
          restore-keys: |
            checkpoint-${{ runner.os }}-

      - name: Seed dummy cache entries
        run: |
          echo "cached-binary" > tests/integration/cache/smoke.txt
          mkdir -p tests/integration/checkpoint_cache/SEPOLIA/entries
          echo '{"networks":{"SEPOLIA":{"warmed_at":0,"entries":{}}}' > tests/integration/checkpoint_cache/manifest.json

      - name: Save binary download cache
        uses: actions/cache/save@v5
        with:
          path: tests/integration/cache
          key: binary-cache-${{ runner.os }}-v1

      - name: Verify cache paths exist
        run: |
          test -f tests/integration/cache/smoke.txt
          test -f tests/integration/checkpoint_cache/manifest.json
          echo "Cache smoke OK"
