name: Integration Test

on:
  workflow_call:
    inputs:
      artifact_name_prefix:
        description: Prefix for the uploaded integration report artifact
        required: true
        type: string

permissions:
  contents: read
  actions: write

jobs:
  integration:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      ETHPILLAR_CHECKPOINT_CACHE_DIR: ${{ github.workspace }}/tests/integration/checkpoint_cache
      CI: true
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Prepare cache directories
        run: |
          mkdir -p tests/integration/cache tests/integration/checkpoint_cache

      - name: Restore binary download cache
        id: binary-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: tests/integration/cache
          # Stable key; prior snapshot is deleted before save (keys are immutable).
          key: binary-cache-${{ runner.os }}-v1
          restore-keys: |
            binary-cache-${{ runner.os }}-

      - name: Restore checkpoint cache
        id: checkpoint-cache-restore
        uses: actions/cache/restore@v5
        with:
          path: tests/integration/checkpoint_cache
          key: checkpoint-${{ runner.os }}-v1
          restore-keys: |
            checkpoint-${{ runner.os }}-

      - name: Run integration matrix
        run: bash tests/integration/run_docker_tests.sh

      - name: Fix cache permissions for Actions save
        if: always()
        run: |
          # Docker tests write both cache dirs as root on the host bind mount.
          # The runner user needs read+traverse to tar them for actions/cache/save.
          # chmod (not chown) is enough — we only widen permissions, not ownership.
          sudo chmod -R a+rX tests/integration/cache tests/integration/checkpoint_cache 2>/dev/null || true

      - name: Delete previous binary caches
        if: always()
        run: |
          set +e
          # GitHub cache keys are immutable; delete old entries so save can publish
          # one updated snapshot (restored files remain on disk).
          gh cache list --key "binary-cache-${{ runner.os }}-" --limit 100 --json id \
            --jq '.[].id' | while read -r cache_id; do
            echo "Deleting cache ${cache_id}"
            gh cache delete "${cache_id}"
          done
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - name: Save binary download cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: tests/integration/cache
          key: binary-cache-${{ runner.os }}-v1

      - name: Delete previous checkpoint caches
        if: always()
        run: |
          set +e
          gh cache list --key "checkpoint-${{ runner.os }}-" --limit 100 --json id \
            --jq '.[].id' | while read -r cache_id; do
            echo "Deleting cache ${cache_id}"
            gh cache delete "${cache_id}"
          done
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}

      - name: Save checkpoint cache
        if: always()
        uses: actions/cache/save@v5
        with:
          path: tests/integration/checkpoint_cache
          key: checkpoint-${{ runner.os }}-v1

      - name: Upload integration report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.artifact_name_prefix }}-${{ github.run_id }}
          path: tests/integration/results/
          retention-days: 90
          if-no-files-found: ignore
