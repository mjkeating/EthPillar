name: Unit & Bats Tests

on:
  workflow_call:

permissions:
  contents: read

jobs:
  unit-and-bats:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build test image
        run: docker build -t ethpillar-test -f tests/integration/Dockerfile.test .

      - name: Unit tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/ethpillar" \
            ethpillar-test \
            bash /ethpillar/tests/run_unit_tests.sh tests/ -v

      - name: Bats tests
        run: |
          docker run --rm \
            -v "${{ github.workspace }}:/ethpillar" \
            ethpillar-test \
            bats tests/

      - name: Install smoke tests
        run: bash tests/integration/run_install_smoke_tests.sh
